<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务看板 · 纪光元生</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header {
      padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.75rem; justify-content: space-between;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    main { max-width: 1100px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    section {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem;
    }
    h1 { margin: 0; font-size: 1.1rem; }
    h2 { margin: 0 0 0.6rem; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .meta { font-size: 0.8rem; color: var(--muted); }
    .pill { font-size: 0.75rem; padding: 0.15rem 0.45rem; border-radius: 999px; background: #21262d; color: var(--muted); }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    pre, .mono { font-family: ui-monospace, monospace; font-size: 0.78rem; white-space: pre-wrap; word-break: break-all; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th, td { border: 1px solid var(--border); padding: 0.35rem 0.5rem; text-align: left; }
    th { background: #0d1117; color: var(--muted); }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #21262d; }
    tbody tr.sel { outline: 1px solid var(--accent); outline-offset: -1px; }
    select {
      background: #0d1117; border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.45rem 0.55rem; font-size: 0.85rem; min-width: 200px;
    }
    button {
      background: var(--accent); color: #fff; border: none; padding: 0.45rem 0.85rem;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    button.secondary { background: #30363d; }
    .tid { cursor: pointer; color: #58a6ff; text-decoration: underline; }
    a.proj-link { color: #58a6ff; }
    input[type="number"] {
      background: #0d1117; border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.35rem 0.45rem; font-size: 0.85rem;
    }
    #taskDetail { max-height: 240px; overflow: auto; padding: 0.5rem; background: #0d1117; border-radius: 6px; border: 1px solid var(--border); margin-top: 0.5rem; }
    .err { color: #f85149; }
  </style>
  <link rel="stylesheet" href="/ui/styles/theme-future.css" />
</head>
<body>
  <header>
    <div>
      <div class="row">
        <a href="/ui/">← 工作台</a>
        <a href="/ui/agents.html">智能体</a>
        <a href="/ui/collab.html">协作委托</a>
        <a href="/ui/marketing.html">营销中心</a>
        <a href="/ui/skills.html">技能库</a>
        <a href="/ui/memory.html">工作记忆</a>
        <a href="/ui/chat.html">对话会话</a>
      </div>
      <h1 style="margin-top:0.4rem">任务看板 <span class="pill">PH2-T02 · UI</span></h1>
    </div>
    <div class="meta mono" style="text-align:right;max-width:24rem">
      <div id="userBar">—</div>
      <div style="margin-top:0.35rem">
        <a href="/docs" target="_blank" rel="noopener noreferrer">Swagger</a>
        · <a href="/redoc" target="_blank" rel="noopener noreferrer">ReDoc</a>
      </div>
    </div>
  </header>
  <main>
    <section>
      <h2>筛选</h2>
      <p class="meta">对接 <code>GET /api/v1/tasks</code>（<code>project_id</code>、<code>status</code>）；项目列表来自 <code>GET /api/v1/projects</code>。项目列链接至项目详情；下方支持 <code>PUT /api/v1/tasks/{id}</code> 更新状态与进度。</p>
      <div class="row">
        <label class="meta">项目
          <select id="fltProject" style="display:block;margin-top:0.25rem">
            <option value="">全部项目</option>
          </select>
        </label>
        <label class="meta">状态
          <select id="fltStatus" style="display:block;margin-top:0.25rem">
            <option value="">全部</option>
            <option value="pending">pending</option>
            <option value="assigned">assigned</option>
            <option value="in_progress">in_progress</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </label>
        <button type="button" class="secondary" id="btnLoad" style="align-self:flex-end">刷新</button>
      </div>
    </section>
    <section>
      <h2>任务列表</h2>
      <div style="overflow:auto">
        <table>
          <thead>
            <tr><th>ID</th><th>项目</th><th>名称</th><th>状态</th><th>进度</th><th>优先级</th></tr>
          </thead>
          <tbody id="taskBody"></tbody>
        </table>
      </div>
      <h3 style="margin:0.85rem 0 0.4rem;font-size:0.9rem;color:var(--muted);font-weight:600">快速更新</h3>
      <p class="meta">先点击列表中一行选中任务，再修改状态或进度并保存。</p>
      <div class="row" style="margin-top:0.35rem">
        <label class="meta">状态
          <select id="qStatus" style="display:block;margin-top:0.25rem">
            <option value="pending">pending</option>
            <option value="assigned">assigned</option>
            <option value="in_progress">in_progress</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </label>
        <label class="meta">进度 0–100
          <input type="number" id="qProg" min="0" max="100" value="0" style="display:block;margin-top:0.25rem" />
        </label>
        <button type="button" class="secondary" id="btnPutTask" disabled style="align-self:flex-end">PUT 保存</button>
      </div>
      <p class="meta" id="qMsg" style="margin-top:0.35rem"></p>
      <p class="meta" style="margin-top:0.5rem">点击 <strong>任务行</strong>（非项目链接）查看 <code>GET /api/v1/tasks/{id}</code> JSON。</p>
      <pre id="taskDetail">—</pre>
    </section>
  </main>
  <script src="api-client.js"></script>
  <script>
    const API = "/api/v1";
    let selectedTaskId = null;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadProjectOptions() {
      const sel = document.getElementById("fltProject");
      const cur = sel.value;
      try {
        const r = await jyisApiFetch(API + "/projects");
        if (!r.ok) throw new Error(String(r.status));
        const list = await r.json();
        const items = Array.isArray(list) ? list : [];
        sel.innerHTML =
          "<option value=\"\">全部项目</option>" +
          items
            .map(
              p =>
                "<option value=\"" +
                escapeHtml(p.id || "") +
                "\">" +
                escapeHtml(p.id || "") +
                " · " +
                escapeHtml(p.name || "") +
                "</option>"
            )
            .join("");
        if (cur && [...sel.options].some(o => o.value === cur)) sel.value = cur;
      } catch (e) {
        sel.innerHTML = "<option value=\"\">加载项目失败</option>";
      }
    }

    async function loadTasks() {
      const tb = document.getElementById("taskBody");
      tb.innerHTML = "";
      const ps = new URLSearchParams();
      ps.set("limit", "200");
      ps.set("offset", "0");
      const pid = document.getElementById("fltProject").value.trim();
      const st = document.getElementById("fltStatus").value.trim();
      if (pid) ps.set("project_id", pid);
      if (st) ps.set("status", st);
      try {
        const r = await jyisApiFetch(API + "/tasks?" + ps.toString());
        if (!r.ok) throw new Error(String(r.status));
        const data = await r.json();
        const items = Array.isArray(data.items) ? data.items : [];
        if (!items.length) {
          const tr = document.createElement("tr");
          tr.innerHTML = "<td colspan=\"6\" class=\"meta\">无任务</td>";
          tb.appendChild(tr);
          return;
        }
        items.forEach(t => {
          const tr = document.createElement("tr");
          tr.dataset.taskId = t.id;
          if (selectedTaskId === t.id) tr.classList.add("sel");
          tr.innerHTML =
            "<td class=\"mono\"><span class=\"tid\">" +
            escapeHtml(t.id || "") +
            "</span></td><td class=\"mono\"><a class=\"proj-link\" href=\"/ui/project.html?id=" +
            encodeURIComponent(String(t.project_id || "")) +
            "\">" +
            escapeHtml(t.project_id || "") +
            "</a></td><td>" +
            escapeHtml(t.name || "") +
            "</td><td>" +
            escapeHtml(t.status || "") +
            "</td><td>" +
            String(t.progress != null ? t.progress : 0) +
            "</td><td>" +
            escapeHtml(t.priority || "") +
            "</td>";
          tb.appendChild(tr);
        });
      } catch (e) {
        const tr = document.createElement("tr");
        tr.innerHTML = "<td colspan=\"6\" class=\"err\">" + escapeHtml(String(e)) + "</td>";
        tb.appendChild(tr);
      }
    }

    async function selectTask(id) {
      selectedTaskId = id;
      document.querySelectorAll("#taskBody tr").forEach(tr => {
        tr.classList.toggle("sel", tr.dataset.taskId === id);
      });
      const pre = document.getElementById("taskDetail");
      pre.textContent = "加载中…";
      try {
        const r = await jyisApiFetch(API + "/tasks/" + encodeURIComponent(id));
        if (!r.ok) throw new Error(String(r.status));
        const j = await r.json();
        pre.textContent = JSON.stringify(j, null, 2);
        document.getElementById("qStatus").value = j.status || "pending";
        document.getElementById("qProg").value = String(j.progress != null ? j.progress : 0);
        document.getElementById("btnPutTask").disabled = false;
      } catch (e) {
        pre.textContent = String(e);
        document.getElementById("btnPutTask").disabled = true;
      }
    }

    document.getElementById("btnLoad").addEventListener("click", () => loadTasks());
    document.getElementById("fltProject").addEventListener("change", () => loadTasks());
    document.getElementById("fltStatus").addEventListener("change", () => loadTasks());

    document.getElementById("taskBody").addEventListener("click", ev => {
      let t = ev.target;
      if (t.nodeType === 3) t = t.parentElement;
      if (!t || t.nodeType !== 1) return;
      if (t.closest("a.proj-link")) return;
      const row = t.closest("tr");
      if (!row || !row.dataset.taskId) return;
      selectTask(row.dataset.taskId);
    });

    document.getElementById("btnPutTask").addEventListener("click", async () => {
      const msg = document.getElementById("qMsg");
      msg.textContent = "";
      msg.className = "meta";
      if (!selectedTaskId) return;
      const status = document.getElementById("qStatus").value;
      const progress = parseInt(String(document.getElementById("qProg").value), 10);
      if (Number.isNaN(progress) || progress < 0 || progress > 100) {
        msg.textContent = "进度须为 0–100 的整数";
        msg.className = "meta err";
        return;
      }
      try {
        const r = await jyisApiFetch(API + "/tasks/" + encodeURIComponent(selectedTaskId), {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status, progress }),
        });
        if (!r.ok) {
          msg.textContent = "失败 " + r.status + " " + (await r.text()).slice(0, 200);
          msg.className = "meta err";
          return;
        }
        msg.textContent = "已保存";
        await loadTasks();
        await selectTask(selectedTaskId);
      } catch (e) {
        msg.textContent = String(e);
        msg.className = "meta err";
      }
    });

    (async () => {
      const ub = typeof jyisInitUserBar === "function" ? jyisInitUserBar({ apiBase: API }) : null;
      if (ub && ub.refresh) await ub.refresh();
      await loadProjectOptions();
      await loadTasks();
    })();
  </script>
</body>
</html>
