<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>对话会话 · 纪光元生</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header {
      padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; align-items: flex-start; gap: 0.75rem; justify-content: space-between;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    main { max-width: 900px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    section {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem;
    }
    h1 { margin: 0; font-size: 1.1rem; }
    h2 { margin: 0 0 0.6rem; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .meta { font-size: 0.8rem; color: var(--muted); }
    .pill { font-size: 0.75rem; padding: 0.15rem 0.45rem; border-radius: 999px; background: #21262d; color: var(--muted); }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .mono { font-family: ui-monospace, monospace; font-size: 0.78rem; }
    textarea {
      width: 100%; min-height: 72px; background: #0d1117; border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.5rem; margin-top: 0.35rem; resize: vertical;
    }
    input[type="text"] {
      flex: 1; min-width: 160px; background: #0d1117; border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.45rem 0.55rem; font-size: 0.85rem;
    }
    button {
      background: var(--accent); color: #fff; border: none; padding: 0.45rem 0.85rem;
      border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    button.secondary { background: #30363d; }
    #sessList { max-height: 200px; overflow: auto; border: 1px solid var(--border); border-radius: 6px; background: #0d1117; }
    .sess-item { padding: 0.45rem 0.65rem; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 0.86rem; }
    .sess-item:hover { background: #21262d; }
    .sess-item.sel { outline: 1px solid var(--accent); outline-offset: -1px; }
    .msg { margin: 0.5rem 0; padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); font-size: 0.88rem; }
    .msg.user { background: #161b22; }
    .msg.assistant { background: #0d1117; }
    .msg small { display: block; color: var(--muted); margin-bottom: 0.25rem; font-size: 0.75rem; }
    #msgBox { max-height: 360px; overflow: auto; margin-top: 0.5rem; }
    .err { color: #f85149; }
  </style>
  <link rel="stylesheet" href="/ui/styles/theme-future.css" />
</head>
<body>
  <header>
    <div>
      <div class="row">
        <a href="/ui/">← 工作台</a>
        <a href="/ui/agents.html">智能体</a>
        <a href="/ui/collab.html">协作委托</a>
        <a href="/ui/marketing.html">营销中心</a>
        <a href="/ui/skills.html">技能库</a>
        <a href="/ui/memory.html">工作记忆</a>
        <a href="/ui/tasks.html">任务看板</a>
      </div>
      <h1 style="margin-top:0.4rem">对话会话 <span class="pill">PH1-T03 · UI</span></h1>
    </div>
    <div class="meta mono" style="text-align:right;max-width:22rem">
      <div id="userBar">—</div>
      <div style="margin-top:0.35rem">
        <a href="/docs" target="_blank" rel="noopener noreferrer">Swagger</a>
        · <a href="/redoc" target="_blank" rel="noopener noreferrer">ReDoc</a>
      </div>
    </div>
  </header>
  <main>
    <section>
      <h2>会话</h2>
      <p class="meta"><code>GET/POST /api/v1/chat/sessions</code>；消息使用非流式 <code>POST …/messages</code>（与老板工作台 SSE 入口并列）。</p>
      <div class="row" style="margin-bottom:0.5rem">
        <input type="text" id="newTitle" placeholder="新会话标题" value="UI 会话" />
        <button type="button" id="btnNewSess">新建</button>
        <button type="button" class="secondary" id="btnRefreshSess">刷新列表</button>
      </div>
      <div id="sessList"></div>
    </section>
    <section>
      <h2>消息</h2>
      <p class="meta" id="sessHint">请先选择左侧会话。</p>
      <textarea id="msgIn" placeholder="输入后发送（dev + LAW-04/05）…"></textarea>
      <button type="button" id="btnSend" style="margin-top:0.5rem" disabled>发送</button>
      <p class="meta" id="sendMsg" style="margin-top:0.35rem"></p>
      <div id="msgBox"></div>
    </section>
  </main>
  <script src="api-client.js"></script>
  <script>
    const API = "/api/v1";
    const LAW = ["LAW-04", "LAW-05"];
    let currentSid = null;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadSessions() {
      const el = document.getElementById("sessList");
      el.innerHTML = "<div class=\"meta\" style=\"padding:0.5rem\">加载中…</div>";
      try {
        const r = await jyisApiFetch(API + "/chat/sessions");
        if (!r.ok) throw new Error(String(r.status));
        const list = await r.json();
        const items = Array.isArray(list) ? list : [];
        if (!items.length) {
          el.innerHTML = "<div class=\"meta\" style=\"padding:0.5rem\">暂无会话，请先新建。</div>";
          return;
        }
        el.innerHTML = items
          .map(
            s =>
              "<div class=\"sess-item mono" +
              (s.id === currentSid ? " sel" : "") +
              "\" data-sid=\"" +
              escapeHtml(s.id || "") +
              "\">" +
              escapeHtml(s.title || s.id || "") +
              " <small style=\"color:var(--muted)\">" +
              escapeHtml(s.id || "") +
              "</small></div>"
          )
          .join("");
        el.querySelectorAll(".sess-item").forEach(node => {
          node.addEventListener("click", () => {
            currentSid = node.getAttribute("data-sid");
            loadSessions();
            loadMessages();
          });
        });
      } catch (e) {
        el.innerHTML = "<div class=\"err\" style=\"padding:0.5rem\">" + escapeHtml(String(e)) + "</div>";
      }
    }

    function renderMessages(messages) {
      const box = document.getElementById("msgBox");
      const arr = Array.isArray(messages) ? messages : [];
      if (!arr.length) {
        box.innerHTML = "<p class=\"meta\">暂无消息</p>";
        return;
      }
      box.innerHTML = arr
        .map(
          m =>
            "<div class=\"msg " +
            escapeHtml(m.role || "") +
            "\"><small class=\"mono\">" +
            escapeHtml(m.role || "") +
            " · " +
            escapeHtml(m.id || "") +
            "</small>" +
            escapeHtml(m.content || "") +
            "</div>"
        )
        .join("");
    }

    async function loadMessages() {
      const hint = document.getElementById("sessHint");
      const btn = document.getElementById("btnSend");
      if (!currentSid) {
        hint.textContent = "请先选择会话。";
        btn.disabled = true;
        document.getElementById("msgBox").innerHTML = "";
        return;
      }
      hint.textContent = "当前会话：" + currentSid;
      btn.disabled = false;
      try {
        const r = await jyisApiFetch(API + "/chat/sessions/" + encodeURIComponent(currentSid) + "/messages");
        if (!r.ok) throw new Error(String(r.status));
        const data = await r.json();
        renderMessages(data.messages || []);
      } catch (e) {
        document.getElementById("msgBox").innerHTML = "<p class=\"err\">" + escapeHtml(String(e)) + "</p>";
      }
    }

    document.getElementById("btnNewSess").addEventListener("click", async () => {
      const title = document.getElementById("newTitle").value.trim() || "新会话";
      try {
        const r = await jyisApiFetch(API + "/chat/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        if (!r.ok) throw new Error(await r.text());
        const s = await r.json();
        currentSid = s.id;
        await loadSessions();
        await loadMessages();
      } catch (e) {
        alert(String(e));
      }
    });

    document.getElementById("btnRefreshSess").addEventListener("click", () => loadSessions());

    document.getElementById("btnSend").addEventListener("click", async () => {
      const sm = document.getElementById("sendMsg");
      sm.textContent = "";
      sm.className = "meta";
      if (!currentSid) return;
      const text = document.getElementById("msgIn").value.trim();
      if (!text) {
        sm.textContent = "请输入内容";
        sm.className = "meta err";
        return;
      }
      try {
        const r = await jyisApiFetch(API + "/chat/sessions/" + encodeURIComponent(currentSid) + "/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, environment: "dev", law: LAW }),
        });
        if (!r.ok) {
          sm.textContent = (await r.text()).slice(0, 300);
          sm.className = "meta err";
          return;
        }
        document.getElementById("msgIn").value = "";
        await loadMessages();
      } catch (e) {
        sm.textContent = String(e);
        sm.className = "meta err";
      }
    });

    (async () => {
      const ub = typeof jyisInitUserBar === "function" ? jyisInitUserBar({ apiBase: API }) : null;
      if (ub && ub.refresh) await ub.refresh();
      await loadSessions();
      if (currentSid) await loadMessages();
    })();
  </script>
</body>
</html>
