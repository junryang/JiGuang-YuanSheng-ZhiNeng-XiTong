name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run project risk alert minimum regressions
        run: |
          python -m pytest tests/test_progress_gantt.py tests/test_project_discussion.py tests/test_api_smoke.py -q --tb=short

      - name: Run chat and llm integration regressions
        run: |
          python -m pytest tests/test_auth_and_chat_stream.py tests/test_llm_router.py -q --tb=short

      - name: Run backend regressions
        run: |
          python -m pytest tests/test_ceo_planning_apply.py tests/test_ph3_agents_skills.py tests/test_api_smoke.py tests/test_progress_gantt.py tests/test_tasks_api.py -q --tb=short
